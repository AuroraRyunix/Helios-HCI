http:
  routers:
    # Router for Console WebSockets (VNC & SPICE)
    console-ws:
      rule: "Path(`/api/vms/console/ws`)"
      entryPoints:
        - websecure
      service: agahnim
      tls: {}

    # Router for all other HTTP/HTTPS requests
    webui:
      rule: "PathPrefix(`/`)"
      entryPoints:
        - websecure
      service: spectrum-backend
      tls: {}

  services:
    agahnim:
      loadBalancer:
        servers:
          - url: "http://127.0.0.1:8081"
    spectrum-backend:
      loadBalancer:
        servers:
          - url: "https://127.0.0.1:8443"
        serversTransport: insecureTransport

  serversTransports:
    insecureTransport:
      insecureSkipVerify: true

tls:
  certificates:
    - certFile: "/etc/hci/spectrum/certs/server.crt"
      keyFile: "/etc/hci/spectrum/certs/server.key"
